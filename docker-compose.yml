services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: aluga
      POSTGRES_PASSWORD: aluga123
      POSTGRES_DB: alugafacil
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3010:3010"
    environment:
      DATABASE_URL: postgresql://aluga:aluga123@db:5432/alugafacil
      NEXTAUTH_URL: http://localhost:3010
      NEXTAUTH_SECRET: change-this-secret
      CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_KEY: ""
      CLOUDINARY_API_SECRET: ""
      RESEND_API_KEY: ""
      EMAIL_FROM: "AlugaFácil <onboarding@example.com>"
    depends_on:
      - db

volumes:
  db_data:
