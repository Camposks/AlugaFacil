server {
  listen 80;
  server_name _;

  # Acelera assets estáticos servidos diretamente do diretório public
  location /_next/static/ {
    alias /usr/share/nginx/html/_next/static/;
    access_log off;
    expires 30d;
  }

  location /static/ {
    alias /usr/share/nginx/html/static/;
    access_log off;
    expires 30d;
  }

  # APIs são encaminhadas para o backend Next.js
  location /api/ {
    proxy_pass http://app:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Para todas as demais rotas, primeiro tenta servir arquivo estático em /public
  location / {
    try_files $uri $uri/ @proxy;
  }

  location @proxy {
    proxy_pass http://app:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
