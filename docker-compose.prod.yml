services:
  db:
    image: postgres:15-alpine
    container_name: alugafacil-db-prod
    restart: always
    environment:
      POSTGRES_USER: aluga
      POSTGRES_PASSWORD: aluga123
      POSTGRES_DB: alugafacil
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aluga -d alugafacil"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alugafacil-app-prod
    restart: always
    ports:
      - "3010:3010"
    environment:
      DATABASE_URL: postgresql://aluga:aluga123@db:5432/alugafacil?schema=public
      NEXTAUTH_URL: http://95.111.238.203:3010
      NEXTAUTH_SECRET: alugafacil_segredo_super_secreto_2026
      NEXT_PUBLIC_APP_URL: http://95.111.238.203:3010
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_prod_data: