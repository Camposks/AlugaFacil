services:
  db:
    image: postgres:15-alpine
    container_name: alugafacil-db-prod
    restart: always
    environment:
      POSTGRES_USER: aluga
      POSTGRES_PASSWORD: aluga123
      POSTGRES_DB: alugafacil
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aluga -d alugafacil"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Servidor temporário automático para aplicar as tabelas do Prisma 7
  migration:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://aluga:aluga123@db:5432/alugafacil?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: npx prisma migrate deploy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alugafacil-app-prod
    restart: always
    ports:
      - "3010:3010"
    environment:
      DATABASE_URL: postgresql://aluga:aluga123@db:5432/alugafacil?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_prod_data: